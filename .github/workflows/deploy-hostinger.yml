name: Deploy to Hostinger

# Publishes sdk.langstitch.com to Hostinger over FTPS.
# FTP account is scoped to the SDK subdomain docroot (deploy to ./).
#
# Required secrets:
#   FTP_SERVER    - Hostinger FTP host (IP only, no ftp:// prefix)
#   FTP_USERNAME  - FTP username for the sdk.langstitch.com account
#   FTP_PASSWORD  - FTP account password
# Optional variable:
#   FTP_SERVER_DIR - default ./

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check FTP configuration
        id: ftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          if [ -z "$FTP_SERVER" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Hostinger deploy — FTP secrets are not configured."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.ftp.outputs.configured == 'true'
        uses: actions/checkout@v7

      - name: Deploy via FTPS
        if: steps.ftp.outputs.configured == 'true'
        id: ftps
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}
          timeout: 120000
          state-name: langstitch-sdk-v1
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            README.md

      - name: Verify live site
        if: steps.ftp.outputs.configured == 'true' && steps.ftps.outcome == 'success'
        run: |
          set -euo pipefail
          URL="https://sdk.langstitch.com/"
          for i in 1 2 3 4 5 6; do
            BODY="$(curl -fsSL --compressed -H "Cache-Control: no-cache" "$URL" || true)"
            if echo "$BODY" | grep -q 'language-targets' \
              && echo "$BODY" | grep -q 'sdk-docs.css?v=' \
              && echo "$BODY" | grep -q 'spring-ai' \
              && echo "$BODY" | grep -Fq 'com.langstitch:langstitch-spring-ai'; then
              echo "Live SDK site OK (attempt $i)."
              exit 0
            fi
            echo "Waiting for cache (attempt $i/6)…"
            sleep 15
          done
          echo "::warning::Hostinger verify inconclusive — sdk.langstitch.com may be served by GitHub Pages."
